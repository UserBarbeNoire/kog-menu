<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 1440px; height: 810px; overflow: hidden; background: #060809; font-family: 'Segoe UI', Arial, sans-serif; }
#bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
body::before { content: ""; position: fixed; inset: 0; background: #060809; z-index: -1; }
.top-glow { position: absolute; top: 0; left: 0; right: 0; height: 180px; background: radial-gradient(ellipse 70% 100% at 50% 0%, rgba(120,40,220,0.75) 0%, rgba(80,20,180,0.35) 45%, transparent 75%); z-index: 1; pointer-events: none; }
.top-glow-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent 0%, rgba(160,60,255,0.4) 15%, rgba(220,100,255,1) 50%, rgba(160,60,255,0.4) 85%, transparent 100%); z-index: 2; pointer-events: none; box-shadow: 0 0 20px rgba(180,60,255,0.8), 0 0 40px rgba(140,40,220,0.5); }

/* TOP RIGHT */
.topright { position: absolute; top: 14px; right: 18px; display: flex; align-items: center; gap: 10px; z-index: 20; }
.coins-box { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 14px; font-size: 13px; color: #fff; font-weight: 600; }
.coins-label { color: rgba(255,255,255,0.6); font-weight: 400; }
.coin-img { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 0 6px rgba(255,160,0,0.9)) drop-shadow(0 0 14px rgba(255,120,0,0.6)); }
.avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, #cc4466, #884488); border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* TITLE */
.title-wrap { position: absolute; top: 18px; left: 0; right: 0; display: flex; justify-content: center; align-items: center; gap: 16px; z-index: 10; }
.title-logo { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 20px rgba(160,80,255,1)); }
.title-text { font-size: 74px; font-weight: 900; color: #fff; font-style: italic; text-shadow: 0 0 40px rgba(255,255,255,0.9), 0 0 80px rgba(255,255,255,0.4), 3px 4px 0 rgba(0,0,0,0.7); font-family: Georgia, serif; }

/* NAV */
.nav { position: absolute; top: 148px; left: 0; right: 0; display: flex; justify-content: center; gap: 120px; z-index: 10; }
.nav-btn {
  font-size: 17px; font-weight: 500; color: #fff; letter-spacing: 0.05em; cursor: pointer;
  text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 28px rgba(180,200,255,0.7), 0 0 55px rgba(120,160,255,0.4);
  transition: transform 0.15s, text-shadow 0.15s;
  padding: 6px 12px; border-radius: 4px;
  position: relative;
}
.nav-btn::after { content: ''; position: absolute; bottom: 0; left: 50%; right: 50%; height: 2px; background: rgba(255,255,255,0.6); transition: left 0.2s, right 0.2s; border-radius: 2px; }
.nav-btn:hover { transform: translateY(-2px); text-shadow: 0 0 18px rgba(255,255,255,1), 0 0 40px rgba(180,200,255,0.9), 0 0 70px rgba(120,160,255,0.6); }
.nav-btn:hover::after { left: 0; right: 0; }
.nav-btn:active { transform: translateY(0px) scale(0.97); }

/* CARDS */
.cards-area { position: absolute; top: 200px; left: 0; right: 0; bottom: 65px; display: flex; justify-content: center; align-items: center; gap: 22px; padding: 0 60px; z-index: 5; }
.card-wrap { position: relative; width: 240px; height: 480px; transform: skewX(-3deg); flex-shrink: 0; cursor: pointer; transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), filter 0.25s; }
.card-wrap:hover { transform: skewX(-3deg) translateY(-12px) scale(1.04); filter: brightness(1.15); }
.card-wrap:hover .card-halo { opacity: 0.9; filter: blur(18px); }
.card-wrap:hover .card-border-svg { filter: none; }
.card-wrap.clicked { transform: skewX(-3deg) translateY(-2px) scale(0.97); transition: transform 0.08s; }
.card-wrap:hover.card-continuer-wrap  .card-border-svg { filter: drop-shadow(0 0 8px #ff3322) drop-shadow(0 0 20px #cc1100); }
.card-wrap:hover.card-parametres-wrap .card-border-svg { filter: drop-shadow(0 0 8px #66ccff) drop-shadow(0 0 20px #2277dd); }
.card-wrap:hover.card-boutique-wrap   .card-border-svg { filter: drop-shadow(0 0 8px #ffdd22) drop-shadow(0 0 20px #cc8800); }
.card-wrap:hover.card-discord-wrap    .card-border-svg { filter: drop-shadow(0 0 8px #bb99ff) drop-shadow(0 0 20px #6644cc); }
.card-halo { position: absolute; inset: -30px; z-index: 0; border-radius: 6px; filter: blur(22px); opacity: 0.65; transition: opacity 0.25s, filter 0.25s; }
.card-continuer-wrap  .card-halo { background: rgba(220,0,0,0.45); }
.card-parametres-wrap .card-halo { background: rgba(40,120,255,0.45); }
.card-boutique-wrap   .card-halo { background: rgba(255,130,0,0.45); }
.card-discord-wrap    .card-halo { background: rgba(100,60,255,0.45); }
.card { position: absolute; inset: 0; border-radius: 3px; overflow: hidden; background: rgba(7,10,13,0.7); }
.card-splash { position: absolute; inset: 0; z-index: 1; opacity: 0.75; }
.card-continuer  .card-splash { background: radial-gradient(ellipse 80% 70% at 60% 55%, rgba(180,0,0,0.55) 0%, rgba(100,0,0,0.3) 40%, transparent 70%), radial-gradient(ellipse 50% 40% at 25% 25%, rgba(140,0,0,0.4) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 75% 80%, rgba(80,0,0,0.35) 0%, transparent 60%); }
.card-parametres .card-splash { background: radial-gradient(ellipse 80% 70% at 60% 55%, rgba(20,80,180,0.55) 0%, rgba(10,50,120,0.3) 40%, transparent 70%), radial-gradient(ellipse 50% 40% at 25% 25%, rgba(10,60,150,0.4) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 75% 80%, rgba(5,40,100,0.35) 0%, transparent 60%); }
.card-boutique   .card-splash { background: radial-gradient(ellipse 80% 70% at 60% 55%, rgba(180,80,0,0.60) 0%, rgba(120,50,0,0.35) 40%, transparent 70%), radial-gradient(ellipse 50% 40% at 25% 25%, rgba(150,65,0,0.45) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 75% 80%, rgba(100,40,0,0.35) 0%, transparent 60%); }
.card-discord    .card-splash { background: radial-gradient(ellipse 80% 70% at 60% 55%, rgba(60,20,160,0.55) 0%, rgba(40,10,120,0.3) 40%, transparent 70%), radial-gradient(ellipse 50% 40% at 25% 25%, rgba(55,15,150,0.4) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 75% 80%, rgba(30,8,100,0.35) 0%, transparent 60%); }
.card-ink { position: absolute; inset: 0; z-index: 2; opacity: 0.7; background-image: radial-gradient(ellipse 18% 25% at 25% 40%, rgba(0,0,0,0.65) 0%, transparent 70%), radial-gradient(ellipse 22% 18% at 65% 60%, rgba(0,0,0,0.55) 0%, transparent 70%), radial-gradient(ellipse 14% 20% at 45% 25%, rgba(0,0,0,0.5) 0%, transparent 70%), radial-gradient(ellipse 20% 15% at 75% 35%, rgba(0,0,0,0.45) 0%, transparent 70%), radial-gradient(ellipse 16% 22% at 35% 75%, rgba(0,0,0,0.55) 0%, transparent 70%); }
.card-img { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 88%; width: auto; object-fit: contain; z-index: 4; pointer-events: none; filter: brightness(1.1); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.card-wrap:hover .card-img { transform: translateX(-50%) scale(1.06) translateY(-6px); }
.card-continuer .card-img {
  -webkit-mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 20%, rgba(0,0,0,0.7) 40%, black 60%);
  mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 20%, rgba(0,0,0,0.7) 40%, black 60%);
}
.card-boutique .card-img { height: 62%; bottom: -10px; left: 20%; transform: translateX(-50%);
  -webkit-mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 20%, rgba(0,0,0,0.7) 40%, black 60%);
  mask-image: linear-gradient(to top, transparent 0%, rgba(0,0,0,0.3) 20%, rgba(0,0,0,0.7) 40%, black 60%);
}
.card-wrap:hover .card-boutique .card-img { transform: translateX(-50%) scale(1.06) translateY(-6px); }
.card-discord .card-img { height: 50%; bottom: auto; top: 50%; transform: translate(-50%, -50%); }
.card-wrap:hover .card-discord .card-img { transform: translate(-50%, -55%) scale(1.06); }
.card-glow { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
.card-continuer  .card-glow { background: radial-gradient(ellipse 90% 35% at 50% 100%, rgba(220,0,0,0.22) 0%, transparent 60%), radial-gradient(ellipse 80% 30% at 50% 0%, rgba(220,0,0,0.10) 0%, transparent 60%); }
.card-parametres .card-glow { background: radial-gradient(ellipse 90% 35% at 50% 100%, rgba(40,120,255,0.22) 0%, transparent 60%), radial-gradient(ellipse 80% 30% at 50% 0%, rgba(40,120,255,0.10) 0%, transparent 60%); }
.card-boutique   .card-glow { background: radial-gradient(ellipse 90% 35% at 50% 100%, rgba(255,140,0,0.22) 0%, transparent 60%), radial-gradient(ellipse 80% 30% at 50% 0%, rgba(255,140,0,0.10) 0%, transparent 60%); }
.card-discord    .card-glow { background: radial-gradient(ellipse 90% 35% at 50% 100%, rgba(100,60,255,0.22) 0%, transparent 60%), radial-gradient(ellipse 80% 30% at 50% 0%, rgba(100,60,255,0.10) 0%, transparent 60%); }
.card-label { position: absolute; top: 16px; left: 0; right: 0; padding: 0 14px; z-index: 7; font-family: 'Anton', Impact, sans-serif; font-size: 28px; font-weight: 400; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; text-shadow: 0 0 5px rgba(255,255,255,0.7), 0 0 12px rgba(220,230,255,0.4), 2px 2px 10px rgba(0,0,0,1); display: flex; align-items: center; gap: 8px; line-height: 1; white-space: nowrap; transition: text-shadow 0.2s; }
.card-boutique .card-label, .card-continuer .card-label, .card-parametres .card-label, .card-discord .card-label { justify-content: center; }
.card-wrap:hover .card-label { text-shadow: 0 0 10px rgba(255,255,255,1), 0 0 25px rgba(220,230,255,0.8), 0 0 50px rgba(180,200,255,0.5), 2px 2px 10px rgba(0,0,0,1); }
.card-label img { width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); }
.card-border-svg { position: absolute; inset: -3px; z-index: 8; pointer-events: none; width: calc(100% + 6px); height: calc(100% + 6px); overflow: visible; }
.card-continuer-wrap  .card-border-svg { filter: drop-shadow(0 0 4px #ff3322) drop-shadow(0 0 12px #cc1100); }
.card-parametres-wrap .card-border-svg { filter: drop-shadow(0 0 4px #44aaff) drop-shadow(0 0 12px #2277dd); }
.card-boutique-wrap   .card-border-svg { filter: drop-shadow(0 0 4px #ffdd22) drop-shadow(0 0 12px #cc8800); }
.card-discord-wrap    .card-border-svg { filter: drop-shadow(0 0 4px #9977ff) drop-shadow(0 0 12px #6644cc); }

/* TOOLTIP on hover */
.card-tooltip { position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%) skewX(3deg); background: rgba(0,0,0,0.75); color: rgba(255,255,255,0.8); font-size: 12px; padding: 4px 10px; border-radius: 4px; white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 20; letter-spacing: 0.04em; }
.card-wrap:hover .card-tooltip { opacity: 1; }

/* BOTTOM ICONS */
.bottom-icons { position: absolute; bottom: 18px; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; z-index: 10; align-items: center; }
.bottom-icon { cursor: pointer; transition: transform 0.18s, filter 0.18s; }
.bottom-icon:hover { transform: scale(1.2) translateY(-3px); }
.icon-yt { filter: drop-shadow(0 0 8px rgba(255,80,80,0.9)) drop-shadow(0 0 18px rgba(255,60,60,0.6)); }
.icon-yt:hover { filter: drop-shadow(0 0 14px rgba(255,80,80,1)) drop-shadow(0 0 28px rgba(255,60,60,0.9)); }
.icon-game { filter: drop-shadow(0 0 8px rgba(255,160,0,0.9)) drop-shadow(0 0 18px rgba(255,100,0,0.6)); }
.icon-game:hover { filter: drop-shadow(0 0 14px rgba(255,160,0,1)) drop-shadow(0 0 28px rgba(255,100,0,0.9)); }
.icon-tiktok:hover { filter: drop-shadow(0 0 14px rgba(255,120,200,1)) drop-shadow(0 0 30px rgba(255,0,150,0.95)) drop-shadow(0 0 50px rgba(200,0,100,0.7)) !important; transform: scale(1.2) translateY(-3px); }

/* RIPPLE effect */
.ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3); transform: scale(0); animation: ripple-anim 0.5s ease-out; pointer-events: none; z-index: 9; }
@keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

/* Entry animation */
@keyframes cardEntrance {
  from { opacity: 0; transform: skewX(-3deg) translateY(40px); }
  to   { opacity: 1; transform: skewX(-3deg) translateY(0); }
}
.card-wrap { animation: cardEntrance 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
.card-wrap:nth-child(1) { animation-delay: 0.05s; }
.card-wrap:nth-child(2) { animation-delay: 0.15s; }
.card-wrap:nth-child(3) { animation-delay: 0.25s; }
.card-wrap:nth-child(4) { animation-delay: 0.35s; }

@keyframes titleEntrance { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
.title-wrap { animation: titleEntrance 0.5s ease both; }
.nav { animation: titleEntrance 0.5s 0.1s ease both; }
</style>
</head>
<body>
<canvas id="bg-canvas" width="1440" height="810"></canvas>
<canvas id="particle-canvas" width="1440" height="810" style="position:fixed;inset:0;z-index:3;pointer-events:none;"></canvas>
<div class="top-glow"></div>
<div class="top-glow-line"></div>

<div class="topright">
  <div class="coins-box">
    <img class="coin-img" id="coin-img" src="" alt=""/>

</div>

  <div class="nav-btn" onclick="gmodCall('parametres')">Paramètres</div>

</div>

  <!-- cards injected by JS -->
</div>

<div class="bottom-icons">
  <div class="bottom-icon icon-yt" onclick="gmodCall('youtube')">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="36" height="36">
      <path fill="white" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>

  </svg>
</div>
</div>

<script>
// ══════════════════════════════════════════════
//  GMOD BRIDGE — appels vers Lua
// ══════════════════════════════════════════════
function gmodCall(action, data) {
  // En Gmod, on utilise window.RunConsoleCommand ou des hooks JS
  // Le framework appelle: frame:AddFunction("kog", "callback", handler)
  if (window.kog && window.kog[action]) {
    window.kog[action](data || {});
  } else {
    console.log('[KOG] Action: ' + action, data);
  }
}

// ══════════════════════════════════════════════
//  API publique — appelée depuis Lua
//  Exemple Lua: frame:RunJavascript("KOG.setCredits(5000)")
// ══════════════════════════════════════════════
window.KOG = {
  setCredits: function(amount) {
    document.getElementById('credit-amount').textContent = Number(amount).toLocaleString();
  },
  setAvatar: function(url) {
    var el = document.getElementById('avatar-content');
    el.innerHTML = '<img src="' + url + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>';
  },
  setPlayerName: function(name) {
    // optionnel — afficher le pseudo quelque part
  }
};

// ══════════════════════════════════════════════

  {

    wrapClass: 'card-continuer-wrap',
    cardClass: 'card-continuer',
    label: '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="white" style="filter:drop-shadow(0 0 6px rgba(255,255,255,0.7));flex-shrink:0;"><path d="M8 5v14l11-7z"/></svg>CONTINUER',
    tooltip: 'Reprendre la partie',
    action: 'continuer',
    borderColor: '#cc1500', cornerColor: '#ff2200',
    sparks: [
      'M2,130 15,124 8,134 22,128', 'M244,280 231,274 238,284 225,278',
      'M100,484 106,470 99,477 112,471', 'M170,2 176,16 169,9 182,15'

  {

    tooltip: 'Configurer le jeu',
    action: 'parametres',
    borderColor: '#2288ff', cornerColor: '#55bbff',
    sparks: [
      'M2,200 14,194 7,204 20,198', 'M244,150 232,144 239,154 226,148',
      'M140,2 145,14 138,8 150,14', 'M80,484 86,470 79,477 92,471'
    ]
  },
  {
    id: 'boutique',

//  CLICK HANDLER with ripple
// ══════════════════════════════════════════════
function handleCardClick(e, action) {
  var wrap = e.currentTarget;
  wrap.classList.add('clicked');
  setTimeout(function() { wrap.classList.remove('clicked'); }, 150);

  // Ripple
  var ripple = document.createElement('div');
  ripple.className = 'ripple';
  var rect = wrap.getBoundingClientRect();
  var size = Math.max(rect.width, rect.height) * 0.6;
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top  = (e.clientY - rect.top  - size/2) + 'px';
  wrap.appendChild(ripple);
  setTimeout(function() { ripple.remove(); }, 500);

  gmodCall(action);
}

// ── ANIMATED GALAXY BACKGROUND ──────────────────────────
var bgCanvas = document.getElementById('bg-canvas');
var bgCtx = bgCanvas.getContext('2d');
var W = window.innerWidth || 1440, H = window.innerHeight || 810;
  // Resize canvas to fill screen
  bgCanvas.width = W; bgCanvas.height = H;
  bgCanvas.style.width = '100%'; bgCanvas.style.height = '100%';

// Generate stars once
var stars = [];
W = bgCanvas.width || 1440; H = bgCanvas.height || 810;
for(var i=0;i<500;i++){
  stars.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.4+0.2,
    baseA: Math.random()*0.6+0.1,
    twinkle: Math.random()*Math.PI*2,
    speed: Math.random()*0.008+0.003,
    hue: Math.random()*80+200  // blue-ish stars
  });
}

// Shooting stars
var shooters = [];
function makeShooter(){
  shooters.push({
    x: Math.random()*W*0.7, y: Math.random()*H*0.4,
    vx: Math.random()*4+2, vy: Math.random()*2+0.5,
    life: 1, len: Math.random()*80+40
  });
}
setInterval(makeShooter, 3000);
makeShooter();

// Nebula blobs (painted once on offscreen canvas)
var nebulaCanvas = document.createElement('canvas');
nebulaCanvas.width = W; nebulaCanvas.height = H; W = bgCanvas.width; H = bgCanvas.height;
var nctx = nebulaCanvas.getContext('2d');
// nebulae array removed


// Floating dust particles
var dust = [];
for(var i=0;i<60;i++){
  dust.push({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-0.5)*0.15, vy:(Math.random()-0.5)*0.08,
    r:Math.random()*1.2+0.3,
    a:Math.random()*0.15+0.03,
    hue:Math.random()*60+220
  });
}

var t = 0;
function drawBg(){
  t++;
  bgCtx.fillStyle='#060809';
  bgCtx.fillRect(0,0,W,H);

  // Nebulae (pure linear gradients)
  bgCtx.drawImage(nebulaCanvas,0,0);

  // Animated top wash — linear only
  var pulse = 0.5+0.5*Math.sin(t*0.006);
  var animG = bgCtx.createLinearGradient(0,0,0,H*0.5);
  animG.addColorStop(0,'rgba(35,3,80,'+(0.05*pulse)+')');
  animG.addColorStop(1,'transparent');
  bgCtx.fillStyle=animG; bgCtx.fillRect(0,0,W,H);

  // Dust
  dust.forEach(function(d){
    d.x+=d.vx; d.y+=d.vy;
    if(d.x<0) d.x=W; if(d.x>W) d.x=0;
    if(d.y<0) d.y=H; if(d.y>H) d.y=0;
    bgCtx.beginPath(); bgCtx.arc(d.x,d.y,d.r,0,Math.PI*2);
    bgCtx.fillStyle='hsla('+d.hue+',70%,80%,'+d.a+')'; bgCtx.fill();
  });

  // Stars (twinkle)
  stars.forEach(function(s){
    s.twinkle+=s.speed;
    var a = s.baseA*(0.4+0.6*Math.sin(s.twinkle));
    bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle='hsla('+s.hue+',60%,90%,'+a+')'; bgCtx.fill();
    // bright star halo
    if(s.r>1.1){
      bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2);
      bgCtx.fillStyle='hsla('+s.hue+',60%,90%,'+(a*0.12)+')'; bgCtx.fill();
    }
  });

  // Shooting stars
  shooters.forEach(function(s,i){
    s.x+=s.vx; s.y+=s.vy; s.life-=0.012;
    if(s.life<=0){ shooters.splice(i,1); return; }
    var g=bgCtx.createLinearGradient(s.x,s.y,s.x-s.vx*s.len/s.vx,s.y-s.vy*s.len/s.vx);
    g.addColorStop(0,'rgba(255,255,255,'+(s.life*0.9)+')');
    g.addColorStop(1,'transparent');
    bgCtx.beginPath(); bgCtx.moveTo(s.x,s.y);
    bgCtx.lineTo(s.x-s.len*Math.cos(Math.atan2(s.vy,s.vx)), s.y-s.len*Math.sin(Math.atan2(s.vy,s.vx)));
    bgCtx.strokeStyle=g; bgCtx.lineWidth=1.5; bgCtx.stroke();
  });

  requestAnimationFrame(drawBg);
}
function drawBg_init(){ drawBg(); }

// ── HOVER PARTICLES on cards ──────────────────────────────
(function(){
  var pc = document.getElementById('particle-canvas');
  var pctx = pc.getContext('2d');
  var PW = 1440, PH = 810;
  var particles = [];
  var hoveredCard = null; // currently hovered card info

  // Card color map
  var cardColors = {
    'continuer':  [220, 30,  0  ],
    'parametres': [40,  140, 255],
    'boutique':   [255, 140, 0  ],
    'discord':    [120, 60,  255]
  };

  // Attach hover listeners to each card after build
  setTimeout(function(){
    ['continuer','parametres','boutique','discord'].forEach(function(id){
      var wrap = document.getElementById('wrap-' + id);
      if(!wrap) return;
      wrap.addEventListener('mouseenter', function(){
        var rect = wrap.getBoundingClientRect();
        hoveredCard = {
          x: rect.left, y: rect.top,
          w: rect.width, h: rect.height,
          color: cardColors[id]
        };
      });
      wrap.addEventListener('mouseleave', function(){
        hoveredCard = null;
      });
    });
  }, 800);

  function spawnFromCard(card) {
    // Pick a random edge
    var side = Math.floor(Math.random()*4);
    var px, py, vx, vy;
    switch(side) {
      case 0: px=card.x+Math.random()*card.w; py=card.y;        vx=(Math.random()-0.5)*1; vy=-(Math.random()*1.5+0.4); break;
      case 1: px=card.x+card.w;               py=card.y+Math.random()*card.h; vx=Math.random()*1.5+0.4; vy=(Math.random()-0.5)*1; break;
      case 2: px=card.x+Math.random()*card.w; py=card.y+card.h; vx=(Math.random()-0.5)*1; vy=Math.random()*1.5+0.4;  break;
      case 3: px=card.x;                       py=card.y+Math.random()*card.h; vx=-(Math.random()*1.5+0.4); vy=(Math.random()-0.5)*1; break;
    }
    particles.push({
      x: px, y: py, vx: vx, vy: vy,
      r: Math.random()*2.5+0.8,
      life: 1,
      decay: Math.random()*0.014+0.008,
      color: card.color,
      type: Math.random() > 0.55 ? 'star' : 'dot',
      rot: Math.random()*Math.PI*2,
      rotSpeed: (Math.random()-0.5)*0.1
    });

    // Corner spark burst occasionally
    if(Math.random() < 0.2){
      var corners = [
        {x:card.x,       y:card.y      },
        {x:card.x+card.w,y:card.y      },
        {x:card.x,       y:card.y+card.h},
        {x:card.x+card.w,y:card.y+card.h}
      ];
      var c = corners[Math.floor(Math.random()*4)];
      for(var k=0;k<3;k++){
        var ang = Math.random()*Math.PI*2;
        var spd = Math.random()*3+1;
        particles.push({
          x:c.x+(Math.random()-0.5)*6, y:c.y+(Math.random()-0.5)*6,
          vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
          r:Math.random()*2+1, life:1,
          decay:Math.random()*0.018+0.012,
          color:card.color, type:'star',
          rot:Math.random()*Math.PI*2,
          rotSpeed:(Math.random()-0.5)*0.15
        });
      }
    }
  }

  function drawStar(ctx, x, y, r, rot){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
    ctx.beginPath();
    for(var k=0;k<5;k++){
      var a1=(k/5)*Math.PI*2-Math.PI/2;
      var a2=((k+0.5)/5)*Math.PI*2-Math.PI/2;
      if(k===0) ctx.moveTo(Math.cos(a1)*r,Math.sin(a1)*r);
      else ctx.lineTo(Math.cos(a1)*r,Math.sin(a1)*r);
      ctx.lineTo(Math.cos(a2)*r*0.38,Math.sin(a2)*r*0.38);
    }
    ctx.closePath(); ctx.fill(); ctx.restore();
  }

  var frame = 0;
  function animateParticles(){
    frame++;
    pctx.clearRect(0,0,PW,PH);

    // Emit only when hovering
    if(hoveredCard && frame % 2 === 0){
      spawnFromCard(hoveredCard);
    }

    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx; p.y+=p.vy;
      p.vx*=0.98; p.vy*=0.98;
      p.life-=p.decay;
      p.rot+=p.rotSpeed;
      if(p.life<=0){ particles.splice(i,1); continue; }

      var r=p.color[0],g=p.color[1],b=p.color[2];
      pctx.globalAlpha=1;
      // Glow
      pctx.beginPath(); pctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);
      pctx.fillStyle='rgba('+r+','+g+','+b+','+(p.life*0.2)+')'; pctx.fill();
      // Particle
      pctx.globalAlpha=p.life;
      pctx.fillStyle='rgba('+r+','+g+','+b+',1)';
      if(p.type==='star') drawStar(pctx,p.x,p.y,p.r*1.8,p.rot);
      else { pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,Math.PI*2); pctx.fill(); }
    }
    pctx.globalAlpha=1;
    requestAnimationFrame(animateParticles);
  }
  animateParticles();
})();
</script>
